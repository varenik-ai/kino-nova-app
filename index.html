<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kino Nova</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a0a; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: white; overflow-x: hidden; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .logo { font-size: 28px; font-weight: 900; color: #e63946; letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; text-align: center; }
    .logo span { color: white; }
    #video-container { width: 100%; max-width: 900px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.6); position: relative; }
    video { width: 100%; display: block; background: #000; }
    #status { margin-top: 14px; font-size: 13px; color: #888; text-align: center; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #e63946; border-radius: 50%; margin-right: 6px; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }
    .btn { margin-top: 12px; padding: 12px 24px; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; width: 90%; max-width: 340px; transition: opacity .2s ease; }
    .btn:active { opacity: .8; }
    #reload-btn { background: #333; display: none; }
    #unmute-btn { background: #e63946; display: none; }
    #fullscreen-btn { background: #1a1a2e; border: 1px solid #444; display: block; }
    #video-container:fullscreen, #video-container:-webkit-full-screen { width: 100vw !important; height: 100vh !important; max-width: none !important; border-radius: 0 !important; display: flex; align-items: center; justify-content: center; }
    #video-container:fullscreen video, #video-container:-webkit-full-screen video { width: auto !important; height: 100vh !important; max-width: 100vw; object-fit: contain; }

    #video-container.is-fullscreen {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      max-width: none !important;
      border-radius: 0 !important;
      z-index: 99999 !important;
      background: #000 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    #video-container.is-fullscreen video {
      width: auto !important;
      height: 100vh !important;
      max-width: 100vw !important;
      object-fit: contain !important;
    }
  </style>
</head>
<body>
<div class="logo">KINO <span>NOVA</span></div>
<div id="video-container">
  <video id="video" controls autoplay playsinline webkit-playsinline airplay="allow"></video>
  <audio id="audio-bg" style="display:none" muted></audio>
</div>
<div id="status"><span class="dot"></span>...</div>
<button id="reload-btn" class="btn"></button>
<button id="unmute-btn" class="btn"></button>
<button id="fullscreen-btn" class="btn"></button>

<script>
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }

  const T = {
    ru: { loading:'Получаем поток...', connecting:'Подключение...', live:'Kino Nova — прямой эфир 🔴', pressPlay:'Нажмите ▶ для просмотра', errorStream:'Ошибка потока...', errorUrl:'Не удалось получить URL', errorServer:'Ошибка сервера', reconnect:'🔄 Переподключиться', unmute:'🔊 Включить звук', fullscreen:'🔳 Полный экран' },
    bg: { loading:'Зареждаме...', connecting:'Свързване...', live:'Kino Nova — на живо 🔴', pressPlay:'Натиснете ▶ за пускане', errorStream:'Грешка на потока...', errorUrl:'Неуспешно', errorServer:'Грешка', reconnect:'🔄 Свържи отново', unmute:'🔊 Включи звук', fullscreen:'🔳 Цял екран' },
    en: { loading:'Loading...', connecting:'Connecting...', live:'Kino Nova — Live 🔴', pressPlay:'Press ▶ to watch', errorStream:'Stream error...', errorUrl:'Failed to get URL', errorServer:'Server error', reconnect:'🔄 Reconnect', unmute:'🔊 Unmute', fullscreen:'🔳 Fullscreen' },
    de: { loading:'Laden...', connecting:'Verbinden...', live:'Kino Nova — Live 🔴', pressPlay:'▶ drücken', errorStream:'Stream-Fehler...', errorUrl:'URL Fehler', errorServer:'Serverfehler', reconnect:'🔄 Neu verbinden', unmute:'🔊 Ton an', fullscreen:'🔳 Vollbild' },
    fr: { loading:'Chargement...', connecting:'Connexion...', live:'Kino Nova — En direct 🔴', pressPlay:'Appuyez ▶', errorStream:'Erreur flux...', errorUrl:'URL introuvable', errorServer:'Erreur serveur', reconnect:'🔄 Reconnecter', unmute:'🔊 Son', fullscreen:'🔳 Plein écran' },
    es: { loading:'Cargando...', connecting:'Conectando...', live:'Kino Nova — En vivo 🔴', pressPlay:'Presione ▶', errorStream:'Error de stream...', errorUrl:'URL fallida', errorServer:'Error servidor', reconnect:'🔄 Reconectar', unmute:'🔊 Sonido', fullscreen:'🔳 Pantalla completa' },
    uk: { loading:'Отримуємо...', connecting:'Підключення...', live:'Kino Nova — прямий ефір 🔴', pressPlay:'Натисніть ▶', errorStream:'Помилка потоку...', errorUrl:'URL не знайдено', errorServer:'Помилка сервера', reconnect:'🔄 Перепідключитись', unmute:'🔊 Звук', fullscreen:'🔳 Повний екран' },
    tr: { loading:'Yükleniyor...', connecting:'Bağlanıyor...', live:'Kino Nova — Canlı 🔴', pressPlay:'▶ basın', errorStream:'Yayın hatası...', errorUrl:'URL alınamadı', errorServer:'Sunucu hatası', reconnect:'🔄 Yeniden Bağlan', unmute:'🔊 Ses', fullscreen:'🔳 Tam ekran' },
  };

  function getLang() {
    try {
      const s = Telegram.WebApp.initDataUnsafe?.user?.language_code?.split('-')[0].toLowerCase();
      if (s && T[s]) return s;
    } catch(e) {}
    const b = (navigator.language || 'en').split('-')[0].toLowerCase();
    return T[b] ? b : 'en';
  }

  const lang = getLang();
  const t = T[lang] || T.en;
  document.documentElement.lang = lang;

  const video          = document.getElementById('video');
  const videoContainer = document.getElementById('video-container');
  const status         = document.getElementById('status');
  const reloadBtn      = document.getElementById('reload-btn');
  const unmuteBtn      = document.getElementById('unmute-btn');
  const fullscreenBtn  = document.getElementById('fullscreen-btn');

  const audioBg = document.getElementById('audio-bg');
  reloadBtn.textContent     = t.reconnect;
  unmuteBtn.textContent     = t.unmute;
  fullscreenBtn.textContent = t.fullscreen;
  reloadBtn.onclick     = () => init();
  unmuteBtn.onclick     = unmute;
  fullscreenBtn.onclick = function() {
    openFullscreen();
  };

  const STREAM_API = 'https://kino-nova-proxy.vercel.app/api/stream';
  const PROXY_BASE = 'https://kino-nova-proxy.vercel.app/api/proxy?url=';

  let hls          = null;
  let hlsAudio     = null;
  let userPaused   = false;
  let pauseByUser  = false;
  let isReconnecting = false;   // fix #1: защита от параллельных reconnect
  let reconnectTimer = null;
  let wakeLockSentinel = null;
  let currentUrl   = null;      // fix #2: храним текущий URL для тихого обновления

  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }
  function isAndroid() { return /Android/i.test(navigator.userAgent); }

  function setStatus(key, isError = false) {
    const msg = t[key] || key;
    status.innerHTML = isError ? '⚠️ ' + msg : '<span class="dot"></span>' + msg;
    reloadBtn.style.display = isError ? 'block' : 'none';
  }

  function unmute() {
    video.muted = false;
    video.volume = 1;
    unmuteBtn.style.display = 'none';
  }

  function setupMediaSession() {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'Kino Nova Bulgaria', artist: 'Live 🔴', album: 'Kino Nova',
      artwork: [{ src: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Kino_Nova_Logo.png/512px-Kino_Nova_Logo.png', sizes: '512x512', type: 'image/png' }]
    });
    navigator.mediaSession.playbackState = 'playing';
    navigator.mediaSession.setActionHandler('play',  async () => { try { await video.play(); } catch(e) {} });
    navigator.mediaSession.setActionHandler('pause', () => { video.pause(); });
    navigator.mediaSession.setActionHandler('stop',  () => { video.pause(); });
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator && !wakeLockSentinel) {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
      }
    } catch(e) {}
  }

  // fix #5: централизованное уничтожение HLS инстансов
  function cleanUp() {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    if (hls)      { hls.destroy();      hls      = null; }
    if (hlsAudio) { hlsAudio.destroy(); hlsAudio = null; }
  }

  // ── Отслеживаем паузу пользователя ──────────────────────────────────────
  video.addEventListener('mousedown', () => { pauseByUser = true; });
  video.addEventListener('touchstart', () => { pauseByUser = true; }, { passive: true });

  video.addEventListener('pause', () => {
    // fix #3: чёткое разделение iOS и Android
    if (isIOS()) {
      userPaused = true;
    } else if (isAndroid() && pauseByUser) {
      userPaused = true;
    }
    pauseByUser = false;
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  });

  video.addEventListener('play', () => {
    userPaused = false;
    isReconnecting = false;
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    // Глушим audio-bg пока видео активно на экране
  });

  // fix #3: чистый visibilitychange без дублирования
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
      // Возврат в приложение
        if (!userPaused && video.paused) {
        try { await video.play(); } catch(e) {}
      }
    } else {
      // Уход в фон — пытаемся удержать video
      if (userPaused) return;
      setTimeout(async () => {
        if (video.paused) { try { await video.play(); } catch(e) {} }
      }, 300);
    }
  });

  window.addEventListener('pageshow', async () => {
    if (!userPaused && video.paused) {
      try { await video.play(); } catch(e) {}
    }
  });

  // ── Fullscreen ───────────────────────────────────────────────────────────
  function openFullscreen() {
    const isFs = videoContainer.classList.contains('is-fullscreen');
    if (isFs) {
      videoContainer.classList.remove('is-fullscreen');
      document.body.style.overflow = '';
      try {
        if (window.Telegram?.WebApp?.exitFullscreen) {
          Telegram.WebApp.exitFullscreen();
        }
      } catch(e) {}
    } else {
      videoContainer.classList.add('is-fullscreen');
      document.body.style.overflow = 'hidden';
      // Скрываем шапку Telegram
      try {
        if (window.Telegram?.WebApp?.requestFullscreen) {
          Telegram.WebApp.requestFullscreen();
        }
      } catch(e) {}
      // iOS нативный fullscreen
      try {
        if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
      } catch(e) {}
    }
  }

  // ── Stream ───────────────────────────────────────────────────────────────
  function loadStream(url) {
    currentUrl = url;
    const proxiedUrl = PROXY_BASE + encodeURIComponent(url);
    cleanUp();
    setStatus('connecting');
    unmuteBtn.style.display = 'none';



    // Запускаем audio-bg MUTED — только для удержания фона на Android
    if (isAndroid() && audioBg) {
      if (Hls.isSupported()) {
        if (hlsAudio) { hlsAudio.destroy(); hlsAudio = null; }
        hlsAudio = new Hls({ liveSyncDurationCount: 3, enableWorker: true });
        hlsAudio.loadSource(proxiedUrl);
        hlsAudio.attachMedia(audioBg);
        hlsAudio.on(Hls.Events.MANIFEST_PARSED, () => {
          audioBg.muted = true; // ВСЕГДА muted — только для фона
          audioBg.play().catch(() => {});
        });
      }
    }

    // fix #4: всегда muted при автостарте
    video.muted = true;

    if (Hls.isSupported()) {
      hls = new Hls({ liveSyncDurationCount: 3, enableWorker: true });
      hls.loadSource(proxiedUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        setStatus('live');
        video.play().then(() => {
          unmuteBtn.style.display = 'block';
          setupMediaSession();
          if (!isIOS()) requestWakeLock();
        }).catch(() => setStatus('pressPlay'));
      });
      // fix #1: защита от параллельных reconnect
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal && !isReconnecting) {
          isReconnecting = true;
          setStatus('errorStream', true);
          cleanUp();
          reconnectTimer = setTimeout(() => {
            isReconnecting = false;
            init();
          }, 5000);
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = proxiedUrl;
      setStatus('live');
      video.play().then(() => {
        unmuteBtn.style.display = 'block';
        setupMediaSession();
        if (!isIOS()) requestWakeLock();
      }).catch(() => setStatus('pressPlay'));
    }
  }

  // fix #2: тихое обновление токена без перезапуска плеера
  async function refreshToken() {
    try {
      const r = await fetch(STREAM_API + '?t=' + Date.now());
      const d = await r.json();
      if (d.url) currentUrl = d.url; // просто сохраняем новый URL
    } catch(e) {}
  }

  async function init() {
    setStatus('loading');
    reloadBtn.style.display = 'none';
    unmuteBtn.style.display = 'none';
    isReconnecting = false;
    try {
      const r = await fetch(STREAM_API + '?t=' + Date.now());
      const d = await r.json();
      if (d.url) loadStream(d.url);
      else setStatus('errorUrl', true);
    } catch(e) {
      setStatus('errorServer', true);
    }
  }

  // Запуск
  init();

  // fix #2: тихое обновление токена раз в 20 минут — плеер НЕ перезапускается
  setInterval(refreshToken, 20 * 60 * 1000);
</script>
</body>
</html>
