<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Kino Nova</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root{
      --bg:#0a0a0a;
      --panel:rgba(10,10,10,.72);
      --panel-strong:rgba(10,10,10,.92);
      --text:#fff;
      --muted:#9a9a9a;
      --accent:#e63946;
      --stroke:rgba(255,255,255,.10);
      --shadow:0 12px 40px rgba(0,0,0,.38);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    html, body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x:hidden;
    }

    body{
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:20px;
      overscroll-behavior:none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .logo{
      font-size:28px;
      font-weight:900;
      letter-spacing:2px;
      color:var(--accent);
      text-transform:uppercase;
      text-align:center;
      user-select:none;
    }

    .logo span{ color:#fff; }

    #stage{
      width:100%;
      max-width:980px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
    }

    #video-container{
      position:relative;
      width:100%;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      box-shadow:var(--shadow);
      aspect-ratio:16/9;
      max-height:72dvh;
      outline:1px solid rgba(255,255,255,.04);
    }

    video{
      width:100%;
      height:100%;
      display:block;
      background:#000;
      object-fit:contain;
      transform:translateZ(0);
      -webkit-transform:translateZ(0);
    }

    #top-scrim{
      position:absolute;
      inset:0 0 auto 0;
      height:48px;
      background:linear-gradient(to bottom, rgba(0,0,0,.42), transparent);
      pointer-events:none;
      z-index:4;
      opacity:0;
      transition:opacity .18s ease;
    }

    #audio-badge{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:3;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(255,255,255,.05), rgba(0,0,0,.96) 60%);
      backdrop-filter:saturate(1.1) blur(2px);
    }

    #audio-badge .pill{
      padding:14px 18px;
      border-radius:999px;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:14px;
      letter-spacing:.2px;
      box-shadow:var(--shadow);
    }

    #gesture-layer{
      position:absolute;
      inset:0;
      z-index:5;
      background:transparent;
      touch-action:pinch-zoom;
    }

    #status{
      min-height:22px;
      font-size:13px;
      color:var(--muted);
      text-align:center;
      user-select:none;
      padding:0 8px;
    }

    .dot{
      display:inline-block;
      width:8px;
      height:8px;
      margin-right:6px;
      border-radius:50%;
      background:var(--accent);
      animation:pulse 1.2s infinite;
      vertical-align:middle;
    }

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.2}
    }

    #controls{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      width:100%;
      max-width:980px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:13px 14px;
      font-size:15px;
      line-height:1;
      cursor:pointer;
      color:#fff;
      background:#262626;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      transition:transform .15s ease, opacity .15s ease, background .15s ease;
      user-select:none;
    }

    .btn:active{ transform:scale(.98); }
    .btn.secondary{ background:#333; }
    .btn.danger{ background:var(--accent); }
    .btn.ghost{ background:#1b1b1b; }
    .btn.hidden{
      opacity:0;
      pointer-events:none;
      transform:translateY(8px);
    }

    /* ===== Fullscreen / Expanded mode ===== */
    body.expanded{
      padding:0;
      gap:0;
      justify-content:flex-start;
      overflow:hidden;
      background:#000;
      min-height:100dvh;
    }

    body.expanded .logo{ display:none; }

    body.expanded #stage{
      position:fixed;
      inset:0;
      width:100vw;
      max-width:none;
      height:100dvh;
      gap:0;
      justify-content:stretch;
      z-index:99999;
      background:#000;
    }

    body.expanded #video-container{
      position:fixed;
      inset:0;
      width:100vw;
      height:100dvh;
      max-width:none;
      aspect-ratio:auto;
      max-height:none;
      border-radius:0;
      box-shadow:none;
      outline:none;
      background:#000;
      z-index:99999;
    }

    body.expanded #status{
      position:fixed;
      top:max(12px, env(safe-area-inset-top));
      left:12px;
      right:12px;
      z-index:100001;
      text-align:center;
      color:#d0d0d0;
      text-shadow:0 2px 8px rgba(0,0,0,.65);
      pointer-events:none;
      opacity:.94;
    }

    body.expanded #controls{
      position:fixed;
      left:12px;
      right:12px;
      bottom:max(12px, env(safe-area-inset-bottom));
      z-index:100002;
      max-width:none;
      grid-template-columns:repeat(4, minmax(0,1fr));
      padding:10px;
      border-radius:16px;
      background:var(--panel);
      border:1px solid var(--stroke);
      backdrop-filter:blur(14px);
      box-shadow:var(--shadow);
      transition:opacity .18s ease, transform .18s ease;
    }

    body.expanded.ui-hidden #controls{
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
    }

    body.expanded.ui-hidden #status{
      opacity:0;
    }

    body.expanded #top-scrim{
      opacity:1;
    }

    body.expanded.landscape video{
      object-fit:cover;
    }

    body.expanded.portrait video{
      object-fit:contain;
    }

    body.audio-only video{
      opacity:.02;
      filter:brightness(0.02);
    }

    body.audio-only #audio-badge{
      display:flex;
    }

    body.audio-only #top-scrim{
      opacity:1;
    }

    /* ===== Android hard fullscreen ===== */
    body.android-hard{
      overflow:hidden !important;
      background:#000 !important;
    }

    body.expanded.android-hard .logo,
    body.expanded.android-hard #status{
      opacity:0 !important;
      pointer-events:none !important;
    }

    body.expanded.android-hard #stage{
      position:fixed;
      left:0;
      right:0;
      top:calc(var(--android-fs-offset, 84px) * -1);
      width:100vw;
      max-width:none;
      height:calc(100dvh + var(--android-fs-offset, 84px));
      gap:0;
      justify-content:stretch;
      z-index:999999;
      background:#000;
    }

    body.expanded.android-hard #video-container{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      max-width:none;
      aspect-ratio:auto;
      max-height:none;
      border-radius:0;
      box-shadow:none;
      outline:none;
      background:#000;
      z-index:999999;
    }

    body.expanded.android-hard video{
      object-fit:cover;
    }

    body.expanded.android-hard #controls{
      z-index:1000000;
    }

    body.expanded.android-hard.ui-hidden #controls{
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
    }


    @media (max-width: 720px){
      #controls{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .logo{ font-size:24px; }
    }

    @media (max-width: 420px){
      body{ padding:14px; }
      #video-container{ border-radius:12px; }
      .btn{ padding:12px 10px; font-size:14px; }
    }
  </style>
</head>

    function getLang() {
      try {
        const s = Telegram.WebApp?.initDataUnsafe?.user?.language_code?.split('-')[0].toLowerCase();
        if (s && T[s]) return s;
      } catch(e) {}
      const b = (navigator.language || 'en').split('-')[0].toLowerCase();
      return T[b] ? b : 'en';
    }

    const lang = getLang();
    const t = T[lang];
    document.documentElement.lang = lang;

    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const status = document.getElementById('status');
    const controls = document.getElementById('controls');
    const reloadBtn = document.getElementById('reload-btn');
    const unmuteBtn = document.getElementById('unmute-btn');
    const modeBtn = document.getElementById('mode-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    const STREAM_API = 'https://kino-nova-proxy.vercel.app/api/stream';
    const PROXY_BASE = 'https://kino-nova-proxy.vercel.app/api/proxy?url=';
    const CACHE_URL_KEY = 'kino_nova_last_good_url_v3';
    const CACHE_MODE_KEY = 'kino_nova_audio_only_v3';

    let hls = null;
    let currentSourceUrl = '';
    let lastFetchedUrl = '';
    let retryTimer = null;
    let retryCount = 0;
    let uiTimer = null;
    let userPaused = false;
    let wakeLockSentinel = null;
    let tapTimer = null;
    let lastTapAt = 0;
    let pendingSourceSwitch = false;
    let audioOnly = localStorage.getItem(CACHE_MODE_KEY) === '1';

    reloadBtn.textContent = t.reconnect;
    unmuteBtn.textContent = t.unmute;
    modeBtn.textContent = audioOnly ? t.videoMode : t.audioOnly;
    fullscreenBtn.textContent = t.fullscreen;

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function getAndroidFsOffset() {
      const vv = window.visualViewport?.height || window.innerHeight || 0;
      const ih = window.innerHeight || vv || 0;
      const delta = Math.max(0, ih - vv);
      return Math.max(84, delta || 0);
    }

    function applyAndroidFsOffset() {
      document.body.style.setProperty('--android-fs-offset', getAndroidFsOffset() + 'px');
    }

    function isExpanded() {
      return document.body.classList.contains('expanded');
    }

    function setStatus(key, isError = false) {
      const msg = t[key] || key;
      status.innerHTML = isError
        ? '⚠️ ' + msg
        : '<span class="dot"></span>' + msg;
    }

    function applyFitMode() {
      if (!isExpanded()) {
        document.body.classList.remove('portrait', 'landscape');
        return;
      }

      if (document.body.classList.contains('android-hard')) {
        document.body.classList.remove('portrait');
        document.body.classList.add('landscape');
        return;
      }

      document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight);
      document.body.classList.toggle('portrait', window.innerWidth <= window.innerHeight);
    }

    function updateFullscreenButton() {
      fullscreenBtn.textContent = isExpanded() ? t.exitFullscreen : t.fullscreen;
    }

    function showControls() {
      controls.classList.remove('hidden');
      if (uiTimer) clearTimeout(uiTimer);
      if (isExpanded()) {
        uiTimer = setTimeout(() => {
          if (!audioOnly) controls.classList.add('hidden');
          status.style.opacity = '0';
        }, 4200);
        status.style.opacity = '0.96';
      } else {
        status.style.opacity = '1';
      }
    }

    function hideControls() {
      if (isExpanded() && !audioOnly) {
        controls.classList.add('hidden');
        status.style.opacity = '0';
      }
    }

    function armAutoHide() {
      if (!isExpanded()) return;
      showControls();
    }

    function setAudioOnlyMode(on) {
      audioOnly = !!on;
      localStorage.setItem(CACHE_MODE_KEY, audioOnly ? '1' : '0');
      document.body.classList.toggle('audio-only', audioOnly);
      modeBtn.textContent = audioOnly ? t.videoMode : t.audioOnly;
      if (audioOnly) {
        controls.classList.remove('hidden');
        status.style.opacity = '1';
        if (uiTimer) clearTimeout(uiTimer);
      }
    }

    async function requestWakeLock() {
      try {
        if (!isIOS() && 'wakeLock' in navigator) {
          wakeLockSentinel = await navigator.wakeLock.request('screen');
        }
      } catch(e) {}
    }

    async function releaseWakeLock() {
      try {
        if (wakeLockSentinel) {
          await wakeLockSentinel.release();
          wakeLockSentinel = null;
        }
      } catch(e) {}
    }

    async function setupMediaSession() {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Kino Nova Bulgaria',
        artist: 'Live 🔴',
        album: 'Kino Nova',
        artwork: [{
          src: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Kino_Nova_Logo.png/512px-Kino_Nova_Logo.png',
          sizes: '512x512',
          type: 'image/png'
        }]
      });
      navigator.mediaSession.playbackState = video.paused ? 'paused' : 'playing';
      navigator.mediaSession.setActionHandler('play', async () => {
        try { await video.play(); } catch(e) {}
      });
      navigator.mediaSession.setActionHandler('pause', () => {
        try { video.pause(); } catch(e) {}
      });
      navigator.mediaSession.setActionHandler('stop', () => {
        try { video.pause(); } catch(e) {}
      });
    }

    function persistGoodUrl(url) {
      if (!url) return;
      localStorage.setItem(CACHE_URL_KEY, url);
      currentSourceUrl = url;
    }

    function stopHls() {
      if (hls) {
        try { hls.destroy(); } catch(e) {}
        hls = null;
      }
    }

    function buildProxiedUrl(url) {
      return PROXY_BASE + encodeURIComponent(url);
    }

    function scheduleRetry(reason = 'error') {
      if (retryTimer) return;
      retryCount = Math.min(retryCount + 1, 6);
      const delay = Math.min(15000, 800 * Math.pow(1.7, retryCount));
      setStatus(reason === 'errorUrl' ? 'errorUrl' : 'errorStream', true);
      retryTimer = setTimeout(async () => {
        retryTimer = null;
        if (currentSourceUrl) {
          await attachStream(currentSourceUrl, { quiet: true, isRetry: true });
        } else {
          await refreshStream(true);
        }
      }, delay);
    }

    function updateQualityClasses() {
      applyFitMode();
      updateFullscreenButton();
      if (isExpanded()) armAutoHide();
    }

    async function enterFullscreenMode() {
      document.body.classList.add('expanded');
      document.body.classList.remove('ui-hidden');
      document.body.style.background = '#000';

      if (isAndroid()) {
        document.body.classList.add('android-hard');
        applyAndroidFsOffset();
      } else {
        document.body.classList.remove('android-hard');
      }

      try {
        if (window.Telegram?.WebApp?.requestFullscreen) {
          await Telegram.WebApp.requestFullscreen();
        }
      } catch(e) {}

      applyFitMode();
      updateFullscreenButton();
      showControls();

      if (window.screen?.orientation?.lock && isAndroid()) {
        try { await screen.orientation.lock('landscape'); } catch(e) {}
      }

      if (!audioOnly) armAutoHide();
    }

    async function exitFullscreenMode() {

      document.body.classList.remove('expanded', 'ui-hidden', 'portrait', 'landscape');
      document.body.style.background = '';

      try {
        if (window.Telegram?.WebApp?.exitFullscreen) {
          await Telegram.WebApp.exitFullscreen();
        }
      } catch(e) {}

      try {
        if (window.screen?.orientation?.unlock) {
          screen.orientation.unlock();
        }
      } catch(e) {}

      if (uiTimer) clearTimeout(uiTimer);
      updateFullscreenButton();
      controls.classList.remove('hidden');
      status.style.opacity = '1';
    }

    async function toggleFullscreen() {
      if (isExpanded()) {
        await exitFullscreenMode();
      } else {
        await enterFullscreenMode();
      }
    }

    function toggleUI() {
      if (!isExpanded()) return;
      const hidden = controls.classList.contains('hidden');
      if (hidden) {
        controls.classList.remove('hidden');
        status.style.opacity = '0.96';
        if (!audioOnly) armAutoHide();
      } else {
        hideControls();
      }
    }

    function wireGestures() {
      const gestureTarget = videoContainer;
      gestureTarget.addEventListener('pointerup', (e) => {
        if (e.target.closest('button')) return;
        const now = Date.now();
        if (now - lastTapAt < 280) {
          lastTapAt = 0;
          if (tapTimer) clearTimeout(tapTimer);
          tapTimer = null;
          toggleFullscreen();
          return;
        }
        lastTapAt = now;
        tapTimer = setTimeout(() => {
          toggleUI();
          tapTimer = null;
        }, 290);
      });

      gestureTarget.addEventListener('pointermove', () => {
        if (isExpanded()) showControls();
      });

      gestureTarget.addEventListener('touchstart', () => {
        if (isExpanded()) showControls();
      }, { passive: true });
    }

    function setVisibleStatus(mode) {
      if (mode === 'loading' && localStorage.getItem(CACHE_URL_KEY)) {
        setStatus('loadingCache');
      } else {
        setStatus(mode);
      }
    }

    async function attachStream(url, options = {}) {
      const { quiet = false, isRetry = false } = options;
      if (!url) return;

      pendingSourceSwitch = true;
      lastFetchedUrl = url;

      if (!quiet) {
        setStatus(isRetry ? 'switching' : (currentSourceUrl ? 'connecting' : 'loading'));
      }

      unmuteBtn.style.display = 'none';

      // keep the current stream available as long as possible while switching
      const proxiedUrl = buildProxiedUrl(url);

      stopHls();

      if (Hls.isSupported()) {
        hls = new Hls({
          liveSyncDurationCount: 3,
          lowLatencyMode: true,
          enableWorker: true,
          backBufferLength: 30,
          maxBufferLength: 20
        });

        hls.loadSource(proxiedUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MEDIA_ATTACHED, () => {});

        hls.on(Hls.Events.MANIFEST_PARSED, async () => {
          persistGoodUrl(url);
          setStatus('live');
          video.muted = audioOnly ? false : true;
          try {
            await video.play();
            unmuteBtn.style.display = audioOnly ? 'none' : 'block';
            retryCount = 0;
            await setupMediaSession();
            if (!isIOS()) requestWakeLock();
          } catch(e) {
            setStatus('pressPlay');
          }
          pendingSourceSwitch = false;
        });

        hls.on(Hls.Events.ERROR, (evt, data) => {
          if (!data) return;

          if (!data.fatal) return;

          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            try { hls.startLoad(); } catch(e) {}
            return;
          }

          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            try { hls.recoverMediaError(); } catch(e) {}
            return;
          }

          scheduleRetry('errorStream');
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = proxiedUrl;
        persistGoodUrl(url);
        setStatus('live');
        video.muted = audioOnly ? false : true;
        try {
          await video.play();
          unmuteBtn.style.display = audioOnly ? 'none' : 'block';
          retryCount = 0;
          await setupMediaSession();
          if (!isIOS()) requestWakeLock();
        } catch(e) {
          setStatus('pressPlay');
        }
        pendingSourceSwitch = false;
      } else {
        setStatus('errorStream', true);
        pendingSourceSwitch = false;
      }
    }

    async function refreshStream(force = false) {
      if (retryTimer) {
        clearTimeout(retryTimer);
        retryTimer = null;
      }

      try {
        const r = await fetch(STREAM_API + '?t=' + Date.now(), { cache: 'no-store' });
        const d = await r.json();
        if (d.url) {
          if (!currentSourceUrl) {
            await attachStream(d.url, { quiet: false });
          } else if (force || d.url !== currentSourceUrl) {
            await attachStream(d.url, { quiet: true, isRetry: true });
          }
          return;
        }
        if (!currentSourceUrl) {
          const cached = localStorage.getItem(CACHE_URL_KEY);
          if (cached) {
            await attachStream(cached, { quiet: false, isRetry: true });
            return;
          }
          setStatus('errorUrl', true);
        }
      } catch (e) {
        const cached = localStorage.getItem(CACHE_URL_KEY);
        if (!currentSourceUrl && cached) {
          await attachStream(cached, { quiet: false, isRetry: true });
          return;
        }
        if (!currentSourceUrl) setStatus('errorServer', true);
      }
    }

    async function init() {
      setVisibleStatus('loading');
      reloadBtn.style.display = 'none';
      unmuteBtn.style.display = 'none';
      await refreshStream(false);
    }

    function unmute() {
      userPaused = false;
      video.muted = false;
      video.volume = 1;
      unmuteBtn.style.display = 'none';
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    }

    // ===== Playback state / background behavior =====
    video.addEventListener('play', () => {
      userPaused = false;
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
      if (isAndroid() && document.visibilityState === 'hidden' && !audioOnly) {
        setTimeout(async () => {
          if (video.paused && !userPaused) {
            try { await video.play(); } catch(e) {}
          }
        }, 250);
      }
    });

    video.addEventListener('pause', () => {
      // mark as user pause only when app is visible
      if (document.visibilityState === 'visible') {
        userPaused = true;
      }
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';

      if (document.visibilityState === 'visible') {
        const wasMuted = video.muted;
        if (!wasMuted) unmuteBtn.style.display = 'block';
      }

      if (isAndroid() && document.visibilityState === 'hidden' && !userPaused && !audioOnly) {
        setTimeout(async () => {
          if (video.paused) {
            try { await video.play(); } catch(e) {}
          }
        }, 250);
      }
    });

    video.addEventListener('waiting', () => {
      if (isExpanded()) setStatus('connecting');
    });

    video.addEventListener('playing', async () => {
      setStatus('live');
      retryCount = 0;
      persistGoodUrl(currentSourceUrl);
      if (!isIOS()) requestWakeLock();
    });

    video.addEventListener('error', () => {
      if (currentSourceUrl) scheduleRetry('errorStream');
    });

    // ===== Visibility =====
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'hidden') {
        if (isIOS()) return;
        if (!video.paused && !audioOnly) {
          setTimeout(async () => {
            if (video.paused && !userPaused) {
              try { await video.play(); } catch(e) {}
            }
          }, 250);
        }
        return;
      }

      // visible
      if (!userPaused && video.paused) {
        try { await video.play(); } catch(e) {}
      }

      if (!isIOS()) {
        try { await requestWakeLock(); } catch(e) {}
      }

      showControls();
    });

    window.addEventListener('pageshow', async () => {
      if (!userPaused && video.paused) {
        try { await video.play(); } catch(e) {}
      }
    });

    // ===== Resize / orientation =====
    window.addEventListener('resize', () => {
      if (document.body.classList.contains('android-hard')) applyAndroidFsOffset();
      applyFitMode();
      if (isExpanded()) armAutoHide();
    });

    window.addEventListener('orientationchange', () => {
      if (document.body.classList.contains('android-hard')) applyAndroidFsOffset();
      applyFitMode();
      if (isExpanded()) armAutoHide();
    });

    // ===== Buttons =====
    reloadBtn.addEventListener('click', async () => {
      userPaused = false;
      await refreshStream(true);
      showControls();
    });

    unmuteBtn.addEventListener('click', () => {
      unmute();
      showControls();
    });

    modeBtn.addEventListener('click', () => {
      setAudioOnlyMode(!audioOnly);
      showControls();
      if (isExpanded()) armAutoHide();
    });

    fullscreenBtn.addEventListener('click', async () => {
      await toggleFullscreen();
      showControls();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isExpanded()) {
        exitFullscreenMode();
      }
      if (e.key === ' ' || e.key === 'Enter') {
        showControls();
      }
    });

    // ===== Idle UI =====
    ['pointerdown', 'mousemove', 'touchstart'].forEach(evt => {
      document.addEventListener(evt, () => {
        if (isExpanded()) showControls();
      }, { passive: true });
    });

    // ===== UX init =====
    setAudioOnlyMode(audioOnly);
    wireGestures();
    updateFullscreenButton();
    if (isAndroid()) applyAndroidFsOffset();
    applyFitMode();

    const cachedUrl = localStorage.getItem(CACHE_URL_KEY);
    if (cachedUrl) {
      setStatus('loadingCache');
      attachStream(cachedUrl, { quiet: true, isRetry: true });
    }

    init();
    setInterval(() => refreshStream(true), 25 * 60 * 1000);
  </script>
</body>
</html>
