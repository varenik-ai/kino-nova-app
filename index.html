<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kino Nova</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { background:#0a0a0a; height:100%; font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:white; overflow:hidden; touch-action:pan-x pan-y pinch-zoom; }
    #player-screen { display:flex; flex-direction:column; align-items:center; height:100%; }
    .player-header { width:100%; display:flex; align-items:center; gap:10px; padding:10px 14px; padding-top:calc(10px + max(var(--tg-safe-top, 0px), env(safe-area-inset-top, 0px))); background:#0d0d0d; border-bottom:1px solid #1e1e1e; flex-shrink:0; }
    .back-btn { background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:7px 12px; color:#aaa; font-size:14px; cursor:pointer; }
    .back-btn:active { opacity:.7; }
    .ch-title-bar { font-size:15px; font-weight:700; }
    .live-badge-top { background:#e67e22; color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; display:none; }
    #video-container { width:100%; flex:1; background:#000; position:relative; overflow:visible; touch-action:pinch-zoom; }
    #video-container.css-fs { position:fixed !important; inset:0 !important; width:100vw !important; height:100vh !important; z-index:9999 !important; }
    #video-container.css-fs .live-badge, #video-container:fullscreen .live-badge, #video-container:-webkit-full-screen .live-badge { display:none !important; }
    #video-container.css-fs video { width:100vw !important; height:100vh !important; }
    #video-container.css-fs .overlay { display:none !important; }
    #video-container:fullscreen .overlay, #video-container:-webkit-full-screen .overlay { display:none !important; }
    video { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:1; }
    audio { display:none; }
    .live-badge { position:absolute; top:14px; left:14px; background:rgba(230,126,34,.95); color:white; font-size:13px; padding:5px 12px; border-radius:30px; display:none; align-items:center; gap:6px; font-weight:700; z-index:25; }
    #audio-badge { position:absolute; inset:0; display:none; align-items:center; justify-content:center; z-index:3; pointer-events:none; background:rgba(0,0,0,.85); }
    #audio-badge .pill { padding:14px 20px; border-radius:999px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); font-size:15px; }
    body.audio-only #audio-badge { display:flex; }
    body.audio-only video { opacity:.02; }
    .overlay { position:absolute; inset:0; z-index:20; pointer-events:none; transition:opacity .5s ease; }
    .overlay.hidden { opacity:0; pointer-events:none; }
    .controls { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,.92)); padding:28px 14px; pointer-events:all; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .btn { padding:12px 18px; color:white; border:none; border-radius:10px; font-size:14px; cursor:pointer; transition:all .2s; flex:1; max-width:160px; background:rgba(255,255,255,.12); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.1); }
    .btn:active { transform:scale(.96); }
    .btn.danger { background:#e67e22; }
    .btn.reload { background:#333; }
    #status { font-size:13px; color:#888; text-align:center; padding:8px 0 0; flex-shrink:0; }
    .dot { display:inline-block; width:8px; height:8px; background:#e67e22; border-radius:50%; margin-right:6px; animation:pulse 1.2s infinite; vertical-align:middle; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
  </style>
</head>
<body>
<div id="player-screen">
  <div class="player-header">
    <button class="back-btn" id="back-btn">← Закрыть</button>
    <span class="ch-title-bar">Kino Nova</span>
    <span class="live-badge-top" id="live-badge-top">LIVE</span>
  </div>
  <div id="video-container">
    <div class="live-badge" id="live-badge"><span class="dot"></span> LIVE</div>
    <div id="audio-badge"><div class="pill">🎧 Аудио режим</div></div>
    <video id="video" autoplay playsinline webkit-playsinline airplay="allow" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;"></video>
    <div class="overlay" id="overlay">
      <div class="controls">
        <button id="reload-btn" class="btn reload" style="display:none"></button>
        <button id="unmute-btn" class="btn danger" style="display:none"></button>
        <button id="mode-btn" class="btn"></button>
        <button id="fullscreen-btn" class="btn"></button>
        <button id="pip-btn" class="btn" style="display:none"></button>
      </div>
    </div>
    <audio id="audio-bg" muted></audio>
  </div>
  <div id="status">...</div>
</div>
<script>
const tg = window.Telegram?.WebApp;
function updateSafeArea() {
  const tgTop = tg?.contentSafeAreaInsets?.top || tg?.safeAreaInsets?.top || 0;
  const top = tgTop > 0 ? tgTop : (document.fullscreenElement || tg?.isFullscreen ? 32 : 0);
  document.documentElement.style.setProperty('--tg-safe-top', top + 'px');
}
if (tg) {
  tg.ready(); tg.expand();
  try { tg.disableVerticalSwipes(); } catch(e) {}
  try { tg.setHeaderColor('#000000'); } catch(e) {}
  try { tg.setBackgroundColor('#000000'); } catch(e) {}
  if (isAndroid() || isIOS()) setTimeout(() => { try { tg.requestFullscreen(); } catch(e) {} }, 300);
  try { tg.onEvent('safeAreaChanged', updateSafeArea); } catch(e) {}
  try { tg.onEvent('contentSafeAreaChanged', updateSafeArea); } catch(e) {}
  setTimeout(updateSafeArea, 500);
}
const T = {
  ru:{ loading:"Получаем поток...", connecting:"Подключение...", live:"ПРЯМОЙ ЭФИР", pressPlay:"Нажмите ▶", errorStream:"Ошибка — переподключаемся...", errorUrl:"Не удалось получить URL", errorServer:"Ошибка сервера", reconnect:"🔄 Переподключиться", unmute:"🔊 Включить звук", mute:"🔇 Выключить звук", fullscreen:"🔳 Полный экран", exitFs:"✕ Выйти", audioMode:"🎧 Только звук", videoMode:"🎥 Видео" },
  bg:{ loading:"Зареждаме...", connecting:"Свързване...", live:"НА ЖИВО", pressPlay:"Натиснете ▶", errorStream:"Грешка...", errorUrl:"Неуспешно", errorServer:"Грешка", reconnect:"🔄 Свържи", unmute:"🔊 Звук", mute:"🔇 Изкл.", fullscreen:"🔳 Екран", exitFs:"✕", audioMode:"🎧 Аудио", videoMode:"🎥 Видео" },
  en:{ loading:"Loading...", connecting:"Connecting...", live:"LIVE", pressPlay:"Press ▶", errorStream:"Error — reconnecting...", errorUrl:"Failed to get URL", errorServer:"Server error", reconnect:"🔄 Reconnect", unmute:"🔊 Unmute", mute:"🔇 Mute", fullscreen:"🔳 Fullscreen", exitFs:"✕ Exit", audioMode:"🎧 Audio only", videoMode:"🎥 Video" },
  de:{ loading:"Laden...", connecting:"Verbinden...", live:"LIVE", pressPlay:"▶ drücken", errorStream:"Fehler...", errorUrl:"Fehler", errorServer:"Serverfehler", reconnect:"🔄 Neu", unmute:"🔊 Ton", mute:"🔇 Stumm", fullscreen:"🔳 Vollbild", exitFs:"✕", audioMode:"🎧 Audio", videoMode:"🎥 Video" },
  fr:{ loading:"Chargement...", connecting:"Connexion...", live:"EN DIRECT", pressPlay:"▶", errorStream:"Erreur...", errorUrl:"Erreur URL", errorServer:"Erreur", reconnect:"🔄 Reconnecter", unmute:"🔊 Son", mute:"🔇 Muet", fullscreen:"🔳 Plein écran", exitFs:"✕", audioMode:"🎧 Audio", videoMode:"🎥 Vidéo" },
  es:{ loading:"Cargando...", connecting:"Conectando...", live:"EN VIVO", pressPlay:"▶", errorStream:"Error...", errorUrl:"Error", errorServer:"Error", reconnect:"🔄 Reconectar", unmute:"🔊 Sonido", mute:"🔇 Silencio", fullscreen:"🔳 Pantalla", exitFs:"✕", audioMode:"🎧 Audio", videoMode:"🎥 Video" },
  uk:{ loading:"Отримуємо...", connecting:"Підключення...", live:"ПРЯМИЙ ЕФІР", pressPlay:"Натисніть ▶", errorStream:"Помилка...", errorUrl:"Помилка URL", errorServer:"Помилка", reconnect:"🔄 Повторити", unmute:"🔊 Звук", mute:"🔇 Вимкнути", fullscreen:"🔳 Екран", exitFs:"✕ Вийти", audioMode:"🎧 Аудіо", videoMode:"🎥 Відео" },
  tr:{ loading:"Yükleniyor...", connecting:"Bağlanıyor...", live:"CANLI", pressPlay:"▶", errorStream:"Hata...", errorUrl:"Hata", errorServer:"Hata", reconnect:"🔄 Bağlan", unmute:"🔊 Ses", mute:"🔇 Sessiz", fullscreen:"🔳 Tam ekran", exitFs:"✕", audioMode:"🎧 Ses", videoMode:"🎥 Video" },
};
function getLang() {
  try { const s=tg?.initDataUnsafe?.user?.language_code?.split("-")[0].toLowerCase(); if(s&&T[s]) return s; } catch(e) {}
  const b=(navigator.language||"en").split("-")[0].toLowerCase(); return T[b]?b:"en";
}
const t = T[getLang()];
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1)||(window.Telegram?.WebApp?.platform==="ios"); }
function isAndroid() { return /Android/i.test(navigator.userAgent); }

const video=document.getElementById("video"), container=document.getElementById("video-container");
const overlay=document.getElementById("overlay"), statusEl=document.getElementById("status");
const liveBadge=document.getElementById("live-badge"), liveBadgeTop=document.getElementById("live-badge-top");
const reloadBtn=document.getElementById("reload-btn"), unmuteBtn=document.getElementById("unmute-btn");
const modeBtn=document.getElementById("mode-btn"), fullscreenBtn=document.getElementById("fullscreen-btn");
const pipBtn=document.getElementById("pip-btn");

let hls=null, hlsAudio=null, hideTimeout=null;
let userPaused=false, audioOnly=false, userUnmuted=false, isExpanded=false, wakeLockSentinel=null;

reloadBtn.textContent=t.reconnect; unmuteBtn.textContent=t.unmute;
modeBtn.textContent=t.audioMode; fullscreenBtn.textContent=t.fullscreen;

function setStatus(key,isError) {
  const msg=t[key]||key;
  statusEl.innerHTML=isError?"⚠️ "+msg:"<span class=\"dot\"></span>"+msg;
  reloadBtn.style.display=isError?"block":"none";
}
function enforceMute() { if(!userUnmuted) video.muted=true; }
function setAudioMode(on) {
  audioOnly=!!on; document.body.classList.toggle("audio-only",audioOnly);
  modeBtn.textContent=audioOnly?t.videoMode:t.audioMode;
  if(audioOnly){overlay.classList.remove("hidden");if(hideTimeout)clearTimeout(hideTimeout);}
}
function showUI() {
  overlay.classList.remove("hidden");
  if(hideTimeout) clearTimeout(hideTimeout);
  if(isExpanded&&!audioOnly) hideTimeout=setTimeout(()=>overlay.classList.add("hidden"),4000);
}
function enterFs() {
  if(video.webkitEnterFullscreen && isIOS()) { video.webkitEnterFullscreen(); isExpanded=true; fullscreenBtn.textContent=t.exitFs; return; }
  try { if(tg?.requestFullscreen) tg.requestFullscreen(); } catch(e) {}
  if(container.requestFullscreen) {
    container.requestFullscreen()
      .then(()=>{ container.classList.remove("css-fs"); document.body.style.overflow=""; })
      .catch(()=>{ container.classList.add("css-fs"); document.body.style.overflow="hidden"; });
  } else if(container.webkitRequestFullscreen) {
    container.webkitRequestFullscreen();
  } else {
    container.classList.add("css-fs"); document.body.style.overflow="hidden";
  }
  isExpanded=true; fullscreenBtn.textContent=t.exitFs;
}
function exitFs() {
  try { if(document.exitFullscreen) document.exitFullscreen(); else if(document.webkitExitFullscreen) document.webkitExitFullscreen(); } catch(e) {}
  container.classList.remove("css-fs"); document.body.style.overflow="";
  isExpanded=false; fullscreenBtn.textContent=t.fullscreen;
  overlay.classList.remove("hidden"); if(hideTimeout){clearTimeout(hideTimeout);hideTimeout=null;}
}
fullscreenBtn.onclick=()=>isExpanded?exitFs():enterFs();
function onFsChange() {
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(fsEl){ isExpanded=true; fullscreenBtn.textContent=t.exitFs; overlay.classList.remove("hidden"); if(hideTimeout)clearTimeout(hideTimeout); hideTimeout=setTimeout(()=>overlay.classList.add("hidden"),3000); video.style.objectFit=window.innerWidth>window.innerHeight?"cover":"contain"; }
  else { isExpanded=false; fullscreenBtn.textContent=t.fullscreen; overlay.classList.remove("hidden"); if(hideTimeout){clearTimeout(hideTimeout);hideTimeout=null;} video.style.objectFit="contain"; if(!userUnmuted) video.muted=true; }
}
document.addEventListener("fullscreenchange",onFsChange);
document.addEventListener("webkitfullscreenchange",onFsChange);
video.addEventListener("webkitendfullscreen",async()=>{
  isExpanded=false; fullscreenBtn.textContent=t.fullscreen; overlay.classList.remove("hidden");
  setTimeout(()=>{ stopStream(); init(); },300);
});
let lastTap=0;
container.addEventListener("pointerup",e=>{ if(e.target.closest("button")) return; const now=Date.now(); if(now-lastTap<280){isExpanded?exitFs():enterFs();lastTap=0;return;} lastTap=now; setTimeout(()=>{if(Date.now()-lastTap>=270)showUI();},290); });
container.addEventListener("pointermove",()=>{if(isExpanded)showUI();});
container.addEventListener("touchstart",()=>{if(isExpanded)showUI();},{passive:true});

if (!isIOS() && !isAndroid()) { pipBtn.style.display='block'; }
pipBtn.textContent='🎥 PiP';
pipBtn.onclick=async()=>{
  try {
    if(document.pictureInPictureElement){ await document.exitPictureInPicture(); pipBtn.textContent='🎥 PiP'; }
    else if(!isIOS()&&video.requestPictureInPicture){ await video.requestPictureInPicture(); pipBtn.textContent='✕ PiP'; }
    else if(video.webkitSetPresentationMode){ userUnmuted=true; video.muted=false; video.volume=1; await new Promise(r=>setTimeout(r,500)); video.webkitSetPresentationMode('picture-in-picture'); pipBtn.textContent='✕ PiP'; }
  } catch(e){}
};
video.addEventListener('enterpictureinpicture',()=>{pipBtn.textContent='✕ PiP';});
video.addEventListener('leavepictureinpicture',async()=>{ pipBtn.textContent='🎥 PiP'; userUnmuted=false; video.muted=true; if(video.paused){try{await video.play();}catch(e){}} });

async function requestWakeLock(){try{if(!isIOS()&&"wakeLock"in navigator&&!wakeLockSentinel)wakeLockSentinel=await navigator.wakeLock.request("screen");}catch(e){}}
function setupMediaSession(){
  if(!("mediaSession"in navigator)) return;
  navigator.mediaSession.metadata=new MediaMetadata({title:"Kino Nova",artist:"Live 🔴",album:"Kino Nova"});
  navigator.mediaSession.playbackState="playing";
  navigator.mediaSession.setActionHandler("play",async()=>{try{await video.play();}catch(e){}});
  navigator.mediaSession.setActionHandler("pause",()=>{video.pause();});
}

let pauseByUser=false;
video.addEventListener("mousedown",()=>{pauseByUser=true;});
video.addEventListener("touchstart",()=>{pauseByUser=true;},{passive:true});
video.addEventListener("pause",()=>{ if(isIOS()||(isAndroid()&&pauseByUser)) userPaused=true; pauseByUser=false; });
video.addEventListener("play",()=>{
  if(!userUnmuted) video.muted=true; userPaused=false;
  if(isAndroid()){const a=document.getElementById("audio-bg");if(a)a.muted=true;}
});
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='hidden'){
    if(isIOS()||userPaused) return;
    setTimeout(async()=>{ if(video.paused){try{await video.play();}catch(e){}} const a=document.getElementById('audio-bg'); if(isAndroid()&&a){a.muted=false;if(a.paused){try{await a.play();}catch(e){}}video.muted=true;} },300);
  } else {
    enforceMute(); if(isAndroid()){const a=document.getElementById('audio-bg');if(a)a.muted=true;}
    if(!userPaused&&video.paused){try{await video.play();}catch(e){stopStream();init();}}
    else if(!userPaused&&video.readyState<2){stopStream();init();}
  }
});
window.addEventListener('pageshow',async()=>{if(!userPaused&&video.paused){try{await video.play();}catch(e){}}});

function stopStream(){
  if(hls){hls.destroy();hls=null;} if(hlsAudio){hlsAudio.destroy();hlsAudio=null;}
  video.src=""; liveBadge.style.display="none"; liveBadgeTop.style.display="none";
  if(wakeLockSentinel){wakeLockSentinel.release().catch(()=>{});wakeLockSentinel=null;}
}
function loadStream(url){
  userUnmuted=false;
  const proxied='https://kino-nova-proxy.dyaltd.workers.dev/api/proxy?url='+encodeURIComponent(url);
  stopStream(); setStatus("connecting"); unmuteBtn.style.display="none";
  if(isAndroid()){const ab=document.getElementById('audio-bg');if(ab&&Hls.isSupported()){hlsAudio=new Hls({liveSyncDurationCount:3,enableWorker:true});hlsAudio.loadSource(proxied);hlsAudio.attachMedia(ab);hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>{ab.muted=true;ab.play().catch(()=>{});});}}
  video.muted=true;
  if(Hls.isSupported()){
    hls=new Hls({liveSyncDurationCount:3,lowLatencyMode:true,enableWorker:true,backBufferLength:30});
    hls.loadSource(proxied); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,async()=>{ setStatus("live"); liveBadge.style.display="flex"; liveBadgeTop.style.display="inline"; try{if(!userUnmuted)video.muted=true;await video.play();unmuteBtn.style.display=audioOnly?"none":"block";setupMediaSession();if(!isIOS())requestWakeLock();}catch(e){setStatus("pressPlay");} });
    hls.on(Hls.Events.ERROR,(e,data)=>{ if(!data.fatal)return; if(data.type===Hls.ErrorTypes.NETWORK_ERROR){try{hls.startLoad();}catch(err){}return;} if(data.type===Hls.ErrorTypes.MEDIA_ERROR){try{hls.recoverMediaError();}catch(err){}return;} setStatus("errorStream",true);setTimeout(()=>init(),5000); });
  } else if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src=proxied; setStatus("live"); liveBadge.style.display="flex"; liveBadgeTop.style.display="inline";
    video.play().then(()=>{unmuteBtn.style.display=audioOnly?"none":"block";setupMediaSession();if(!isIOS())requestWakeLock();}).catch(()=>setStatus("pressPlay"));
  }
}
async function init(){
  setStatus("loading"); reloadBtn.style.display="none"; unmuteBtn.style.display="none";
  try{ const r=await fetch('https://kino-nova-proxy.dyaltd.workers.dev/api/stream?t='+Date.now(),{cache:"no-store"}); const d=await r.json(); if(d.url)loadStream(d.url); else setStatus("errorUrl",true); }catch(e){setStatus("errorServer",true);}
}

reloadBtn.onclick=()=>{userPaused=false;init();};
unmuteBtn.onclick=()=>{
  const ab=document.getElementById('audio-bg');
  if(video.muted){video.muted=false;video.volume=1;userUnmuted=true;unmuteBtn.textContent="🔇 "+t.mute;if(ab){ab.muted=true;ab.pause();}}
  else{video.muted=true;userUnmuted=false;unmuteBtn.textContent=t.unmute;if(ab&&isIOS()){ab.muted=false;ab.volume=0;ab.play().catch(()=>{});}}
};
modeBtn.onclick=()=>setAudioMode(!audioOnly);
document.getElementById("back-btn").onclick=()=>{ try{ Telegram.WebApp.close(); }catch(e){} };

init();
</script>
</body>
</html>
